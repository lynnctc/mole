<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Whack-a-Mole — 觸控打地鼠</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bungee&family=Fraunces:opsz,wght@9..144,300;9..144,800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #1a0f08;
    --sky: #87ceeb;
    --soil: #4a2c1a;
    --soil-light: #6b3f24;
    --grass: #5a8a2c;
    --grass-dark: #3d6019;
    --fg: #fff8e7;
    --accent: #ffb627;
    --danger: #e63946;
    --line: rgba(255, 248, 231, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Fraunces', Georgia, serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    overscroll-behavior: none;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background: linear-gradient(180deg, #87ceeb 0%, #b8e0f0 35%, #f5deb3 70%, #d2a679 100%);
  }

  /* === HUD === */
  header {
    padding: 0.8rem 1.2rem;
    border-bottom: 3px solid var(--soil);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: linear-gradient(180deg, #2a1810 0%, #1a0f08 100%);
    z-index: 5;
    position: relative;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .brand-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--accent);
    border-radius: 2px;
  }

  .brand-title {
    font-family: 'Bungee', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: var(--fg);
    text-transform: uppercase;
  }

  .brand-title span {
    color: var(--accent);
  }

  .score-board {
    display: flex;
    gap: 0.8rem;
    align-items: stretch;
  }

  .score-box {
    text-align: right;
    padding: 0.15rem 0.6rem;
    border-left: 1px solid var(--line);
  }

  .score-box:first-child { border-left: none; }

  .score-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: rgba(255, 248, 231, 0.5);
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.1rem;
  }

  .score-value {
    font-family: 'Bungee', sans-serif;
    font-size: 1.4rem;
    line-height: 1;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
  }

  .score-value.score { color: var(--accent); }
  .score-value.miss { color: var(--danger); }

  .score-value.flash {
    animation: scoreFlash 0.35s ease;
  }

  @keyframes scoreFlash {
    0% { transform: scale(1.5); }
    100% { transform: scale(1); }
  }

  /* === 主畫面 === */
  main {
    position: relative;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* 開始 / 結束 覆蓋層 */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(26, 15, 8, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    z-index: 10;
    backdrop-filter: blur(10px);
  }

  .overlay.hidden { display: none; }

  .overlay-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 1.2rem;
  }

  .overlay-title {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(2.5rem, 9vw, 5rem);
    line-height: 1;
    letter-spacing: 0.01em;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }

  .overlay-title .accent { color: var(--accent); }

  .overlay-desc {
    font-size: 1rem;
    color: rgba(255, 248, 231, 0.75);
    max-width: 32ch;
    line-height: 1.6;
    margin-bottom: 1.8rem;
  }

  .moles-legend {
    display: flex;
    gap: 1.8rem;
    margin-bottom: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255, 248, 231, 0.7);
  }

  .legend-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .legend-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
  }

  .legend-mole { background: #8b5a2b; box-shadow: inset -4px -4px 0 #5a3a1c; }
  .legend-gold { background: #ffb627; box-shadow: inset -4px -4px 0 #b8801a; }
  .legend-bomb { background: #2a2a2a; box-shadow: inset -4px -4px 0 #000; }

  .game-btn {
    font-family: 'Bungee', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    padding: 1.1rem 2.8rem;
    cursor: pointer;
    border-radius: 6px;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    box-shadow: 0 5px 0 #b8801a;
  }

  .game-btn:hover, .game-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #b8801a;
  }

  .game-btn.secondary {
    background: transparent;
    color: var(--fg);
    border: 2px solid var(--line);
    box-shadow: none;
    margin-top: 0.8rem;
    padding: 0.8rem 2rem;
    font-size: 0.85rem;
  }

  .game-btn.secondary:hover, .game-btn.secondary:active {
    transform: none;
    border-color: var(--accent);
    color: var(--accent);
  }

  .final-score {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(4rem, 18vw, 9rem);
    color: var(--accent);
    line-height: 1;
    margin: 0.5rem 0;
    font-variant-numeric: tabular-nums;
  }

  /* 倒數 */
  .countdown {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9;
    pointer-events: none;
  }

  .countdown.hidden { display: none; }

  .countdown-num {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(8rem, 25vw, 16rem);
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 60px rgba(255, 182, 39, 0.7), 0 6px 0 #b8801a;
    animation: countPop 1s ease forwards;
  }

  @keyframes countPop {
    0%   { transform: scale(0.4) rotate(-15deg); opacity: 0; }
    30%  { transform: scale(1.2) rotate(0); opacity: 1; }
    70%  { transform: scale(1) rotate(0); opacity: 1; }
    100% { transform: scale(1.6) rotate(10deg); opacity: 0; }
  }

  /* === 底部 === */
  footer {
    padding: 0.6rem 1.2rem;
    border-top: 3px solid var(--soil);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: linear-gradient(0deg, #2a1810 0%, #1a0f08 100%);
    z-index: 5;
    position: relative;
    min-height: 38px;
  }

  .tip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: rgba(255, 248, 231, 0.5);
    text-transform: uppercase;
  }

  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--fg);
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    border-radius: 2px;
  }

  .ctrl-btn:hover, .ctrl-btn:active {
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 600px) {
    header { padding: 0.6rem 0.9rem; }
    .brand-title { font-size: 0.9rem; }
    .score-value { font-size: 1.15rem; }
    .score-box { padding: 0.15rem 0.45rem; }
    .moles-legend { gap: 1.2rem; }
  }
</style>
</head>

<body>
<div class="app">

  <header>
    <div class="brand">
      <span class="brand-mark">TAP</span>
      <span class="brand-title">Whack <span>·</span> A <span>·</span> Mole</span>
    </div>
    <div class="score-board">
      <div class="score-box">
        <span class="score-label">Time</span>
        <span class="score-value" id="timeValue">45</span>
      </div>
      <div class="score-box">
        <span class="score-label">Hit</span>
        <span class="score-value" id="hitValue">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">Score</span>
        <span class="score-value score" id="scoreValue">0</span>
      </div>
    </div>
  </header>

  <main>
    <div class="stage" id="stage">
      <canvas id="gameCanvas"></canvas>

      <div class="countdown hidden" id="countdown">
        <div class="countdown-num" id="countdownNum">3</div>
      </div>

      <div class="overlay" id="startOverlay">
        <div class="overlay-eyebrow">TAP TO PLAY · 45 SECONDS</div>
        <h1 class="overlay-title">Whack the <span class="accent">Moles</span></h1>
        <p class="overlay-desc">點擊冒出來的地鼠就能得分！金色地鼠分數最高，黑色炸彈千萬不要點。</p>
        <div class="moles-legend">
          <div class="legend-item">
            <div class="legend-dot legend-mole"></div>
            <div>+10</div>
          </div>
          <div class="legend-item">
            <div class="legend-dot legend-gold"></div>
            <div>+50</div>
          </div>
          <div class="legend-item">
            <div class="legend-dot legend-bomb"></div>
            <div>−30</div>
          </div>
        </div>
        <button class="game-btn" id="startBtn">開始遊戲</button>
      </div>

      <div class="overlay hidden" id="endOverlay">
        <div class="overlay-eyebrow" id="endEyebrow">TIME'S UP</div>
        <div class="final-score" id="finalScore">0</div>
        <p class="overlay-desc">
          <span id="finalStats">— moles whacked</span>
        </p>
        <button class="game-btn" id="restartBtn">再玩一次</button>
        <button class="game-btn secondary" id="quitBtn">結束遊戲</button>
      </div>
    </div>
  </main>

  <footer>
    <span class="tip" id="tipText">點擊地鼠得分 · 避開炸彈</span>
  </footer>

</div>

<script>
// ─────────────────────────────────────────────
//  DOM
// ─────────────────────────────────────────────
const stage        = document.getElementById('stage');
const gameCanvas   = document.getElementById('gameCanvas');
const gctx         = gameCanvas.getContext('2d');

const startOverlay = document.getElementById('startOverlay');
const endOverlay   = document.getElementById('endOverlay');
const endEyebrow   = document.getElementById('endEyebrow');
const countdown    = document.getElementById('countdown');
const countdownNum = document.getElementById('countdownNum');

const startBtn     = document.getElementById('startBtn');
const restartBtn   = document.getElementById('restartBtn');
const quitBtn      = document.getElementById('quitBtn');

const scoreValue   = document.getElementById('scoreValue');
const hitValue     = document.getElementById('hitValue');
const timeValue    = document.getElementById('timeValue');
const finalScore   = document.getElementById('finalScore');
const finalStats   = document.getElementById('finalStats');

// ─────────────────────────────────────────────
//  常數 / 狀態
// ─────────────────────────────────────────────
const GAME_DURATION = 45;
const HOLE_GRID = { cols: 3, rows: 3 };

let gameState = 'idle'; // idle / countdown / playing / ended
let score = 0;
let molesWhacked = 0;
let goldenWhacked = 0;
let bombsHit = 0;
let timeLeft = GAME_DURATION;
let gameStartTime = 0;
let lastSpawnTime = 0;
let spawnInterval = 1100;

const holes = [];
const moles = [];
const particles = [];
const taps = []; // 點擊水波擴散效果

// ─────────────────────────────────────────────
//  Canvas 自適應
// ─────────────────────────────────────────────
function resizeCanvas() {
  const rect = stage.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  gameCanvas.width  = rect.width  * dpr;
  gameCanvas.height = rect.height * dpr;
  gameCanvas.style.width  = rect.width + 'px';
  gameCanvas.style.height = rect.height + 'px';
  gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  buildHoles(rect.width, rect.height);
}

function buildHoles(W, H) {
  holes.length = 0;
  if (!W || !H) return;

  const usableH = H * 0.78;
  const startY = H * 0.18;

  for (let r = 0; r < HOLE_GRID.rows; r++) {
    const t = r / (HOLE_GRID.rows - 1);
    const y = startY + t * usableH;
    const sizeFactor = 0.6 + t * 0.5;
    const horizontalInset = (1 - sizeFactor) * 0.18;

    for (let c = 0; c < HOLE_GRID.cols; c++) {
      const tc = (c + 0.5) / HOLE_GRID.cols;
      const x = W * (horizontalInset + tc * (1 - 2 * horizontalInset));
      const radius = Math.min(W, H) * 0.085 * sizeFactor;
      holes.push({ x, y, radius, sizeFactor });
    }
  }
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

// ─────────────────────────────────────────────
//  地鼠
// ─────────────────────────────────────────────
function spawnMole() {
  const occupied = new Set(moles.filter(m => m.state !== 'hit').map(m => m.holeIdx));
  const available = holes.map((_, i) => i).filter(i => !occupied.has(i));
  if (available.length === 0) return;

  const idx = available[Math.floor(Math.random() * available.length)];
  const hole = holes[idx];

  const r = Math.random();
  let type;
  if (r < 0.10) type = 'bomb';
  else if (r < 0.25) type = 'gold';
  else type = 'normal';

  // 觸控版可以稍微縮短一點，因為點擊比手揮快
  const lifetime = type === 'gold'
    ? 1300
    : type === 'bomb'
      ? 2000
      : 1500 + (1 - hole.sizeFactor) * 400;

  moles.push({
    holeIdx: idx,
    type,
    born: performance.now(),
    lifetime,
    state: 'rising',
    progress: 0,
    points: type === 'gold' ? 50 : type === 'bomb' ? -30 : 10
  });
}

function updateMoles(dt) {
  const now = performance.now();
  for (let i = moles.length - 1; i >= 0; i--) {
    const m = moles[i];
    const age = now - m.born;
    const total = m.lifetime;

    if (m.state !== 'hit') {
      const t = age / total;
      if (t < 0.25) {
        m.state = 'rising';
        m.progress = t / 0.25;
      } else if (t < 0.75) {
        m.state = 'showing';
        m.progress = 1;
      } else if (t < 1) {
        m.state = 'sinking';
        m.progress = 1 - (t - 0.75) / 0.25;
      } else {
        moles.splice(i, 1);
        continue;
      }
    } else {
      m.progress -= dt / 250;
      if (m.progress <= 0) {
        moles.splice(i, 1);
      }
    }
  }
}

function drawHole(hole) {
  const { x, y, radius } = hole;

  // 洞陰影
  gctx.beginPath();
  gctx.ellipse(x, y + radius * 0.15, radius * 1.15, radius * 0.45, 0, 0, Math.PI * 2);
  gctx.fillStyle = 'rgba(0,0,0,0.35)';
  gctx.fill();

  // 草地凸起
  const grassGrad = gctx.createRadialGradient(x, y - radius * 0.2, radius * 0.2, x, y, radius * 1.2);
  grassGrad.addColorStop(0, '#7aae3e');
  grassGrad.addColorStop(0.6, '#5a8a2c');
  grassGrad.addColorStop(1, '#3d6019');
  gctx.beginPath();
  gctx.ellipse(x, y, radius * 1.18, radius * 0.58, 0, 0, Math.PI * 2);
  gctx.fillStyle = grassGrad;
  gctx.fill();

  // 草地紋理（小三角）
  gctx.fillStyle = 'rgba(125, 180, 70, 0.5)';
  for (let i = 0; i < 5; i++) {
    const gx = x - radius * 0.9 + (i / 4) * radius * 1.8;
    const gy = y - radius * 0.4;
    gctx.beginPath();
    gctx.moveTo(gx, gy);
    gctx.lineTo(gx + 3, gy - 6);
    gctx.lineTo(gx + 6, gy);
    gctx.fill();
  }

  // 洞口
  const holeGrad = gctx.createRadialGradient(x, y, radius * 0.2, x, y, radius * 0.95);
  holeGrad.addColorStop(0, '#0a0500');
  holeGrad.addColorStop(0.7, '#1a0f08');
  holeGrad.addColorStop(1, '#3a2818');
  gctx.beginPath();
  gctx.ellipse(x, y, radius * 0.85, radius * 0.4, 0, 0, Math.PI * 2);
  gctx.fillStyle = holeGrad;
  gctx.fill();

  gctx.strokeStyle = 'rgba(0,0,0,0.5)';
  gctx.lineWidth = 2;
  gctx.stroke();
}

function drawMole(mole) {
  const hole = holes[mole.holeIdx];
  if (!hole) return;
  const { x, y, radius } = hole;

  const showHeight = radius * 1.5 * mole.progress;
  const cx = x;
  const cy = y - showHeight;
  const r = radius * 0.78;

  gctx.save();

  gctx.beginPath();
  gctx.rect(x - radius * 1.2, y - radius * 3, radius * 2.4, radius * 3 - radius * 0.05);
  gctx.clip();

  if (mole.type === 'bomb') {
    drawBomb(cx, cy, r, mole);
  } else {
    drawMoleBody(cx, cy, r, mole);
  }

  gctx.restore();

  if (mole.state === 'hit') {
    const fade = mole.progress;
    gctx.save();
    gctx.globalAlpha = fade;
    gctx.fillStyle = mole.type === 'bomb' ? '#e63946' : mole.type === 'gold' ? '#ffb627' : '#fff8e7';
    gctx.font = `bold ${Math.floor(r * 0.7)}px Bungee, sans-serif`;
    gctx.textAlign = 'center';
    gctx.strokeStyle = 'rgba(0,0,0,0.6)';
    gctx.lineWidth = 4;
    const text = mole.type === 'bomb' ? 'OUCH!' : mole.type === 'gold' ? 'WOW!' : 'HIT!';
    gctx.strokeText(text, x, y - radius - r * 0.5 - (1 - fade) * 30);
    gctx.fillText(text, x, y - radius - r * 0.5 - (1 - fade) * 30);
    gctx.restore();
  }
}

function drawMoleBody(cx, cy, r, mole) {
  const isGold = mole.type === 'gold';
  const bodyColor   = isGold ? '#ffb627' : '#8b5a2b';
  const bodyShadow  = isGold ? '#b8801a' : '#5a3a1c';
  const bellyColor  = isGold ? '#ffd166' : '#c89878';

  // 身體
  gctx.beginPath();
  gctx.arc(cx, cy, r, 0, Math.PI * 2);
  const grad = gctx.createRadialGradient(cx - r * 0.3, cy - r * 0.4, r * 0.2, cx, cy, r);
  grad.addColorStop(0, isGold ? '#ffe08a' : '#a87a4b');
  grad.addColorStop(0.6, bodyColor);
  grad.addColorStop(1, bodyShadow);
  gctx.fillStyle = grad;
  gctx.fill();

  // 肚子
  gctx.beginPath();
  gctx.ellipse(cx, cy + r * 0.25, r * 0.55, r * 0.4, 0, 0, Math.PI * 2);
  gctx.fillStyle = bellyColor;
  gctx.fill();

  // 耳朵
  [[-1], [1]].forEach(([sx]) => {
    gctx.beginPath();
    gctx.arc(cx + sx * r * 0.55, cy - r * 0.65, r * 0.2, 0, Math.PI * 2);
    gctx.fillStyle = bodyShadow;
    gctx.fill();

    gctx.beginPath();
    gctx.arc(cx + sx * r * 0.55, cy - r * 0.62, r * 0.1, 0, Math.PI * 2);
    gctx.fillStyle = '#3a1a0a';
    gctx.fill();
  });

  // 眼睛
  [[-1], [1]].forEach(([sx]) => {
    gctx.beginPath();
    gctx.arc(cx + sx * r * 0.28, cy - r * 0.15, r * 0.14, 0, Math.PI * 2);
    gctx.fillStyle = '#fff';
    gctx.fill();

    gctx.beginPath();
    gctx.arc(cx + sx * r * 0.32, cy - r * 0.13, r * 0.07, 0, Math.PI * 2);
    gctx.fillStyle = '#000';
    gctx.fill();

    // 眼睛高光
    gctx.beginPath();
    gctx.arc(cx + sx * r * 0.34, cy - r * 0.16, r * 0.025, 0, Math.PI * 2);
    gctx.fillStyle = '#fff';
    gctx.fill();
  });

  // 鼻子
  gctx.beginPath();
  gctx.arc(cx, cy + r * 0.05, r * 0.11, 0, Math.PI * 2);
  gctx.fillStyle = '#3a1a0a';
  gctx.fill();

  // 鼻子高光
  gctx.beginPath();
  gctx.arc(cx - r * 0.03, cy + r * 0.02, r * 0.04, 0, Math.PI * 2);
  gctx.fillStyle = 'rgba(255,255,255,0.5)';
  gctx.fill();

  // 嘴巴
  gctx.beginPath();
  gctx.moveTo(cx - r * 0.18, cy + r * 0.22);
  gctx.lineTo(cx + r * 0.18, cy + r * 0.22);
  gctx.strokeStyle = '#3a1a0a';
  gctx.lineWidth = Math.max(2, r * 0.05);
  gctx.lineCap = 'round';
  gctx.stroke();

  // 牙齒
  gctx.fillStyle = '#fff';
  gctx.fillRect(cx - r * 0.07, cy + r * 0.22, r * 0.06, r * 0.13);
  gctx.fillRect(cx + r * 0.01, cy + r * 0.22, r * 0.06, r * 0.13);

  // 金鼠閃光
  if (isGold) {
    const t = (performance.now() / 200) % (Math.PI * 2);
    gctx.save();
    gctx.globalAlpha = 0.6 + Math.sin(t) * 0.3;
    gctx.beginPath();
    gctx.arc(cx + r * 0.35, cy - r * 0.5, r * 0.1, 0, Math.PI * 2);
    gctx.fillStyle = '#fff';
    gctx.fill();
    gctx.restore();

    // 金鼠冠
    gctx.fillStyle = '#fff8e7';
    gctx.font = `bold ${Math.floor(r * 0.4)}px Bungee, sans-serif`;
    gctx.textAlign = 'center';
    gctx.strokeStyle = '#3a1a0a';
    gctx.lineWidth = 3;
    gctx.strokeText('★', cx, cy - r * 0.85);
    gctx.fillText('★', cx, cy - r * 0.85);
  }
}

function drawBomb(cx, cy, r, mole) {
  const grad = gctx.createRadialGradient(cx - r * 0.3, cy - r * 0.4, r * 0.1, cx, cy, r);
  grad.addColorStop(0, '#5a5a5a');
  grad.addColorStop(0.6, '#2a2a2a');
  grad.addColorStop(1, '#000');
  gctx.beginPath();
  gctx.arc(cx, cy, r, 0, Math.PI * 2);
  gctx.fillStyle = grad;
  gctx.fill();

  // 引信
  gctx.strokeStyle = '#8a6a3a';
  gctx.lineWidth = Math.max(3, r * 0.07);
  gctx.lineCap = 'round';
  gctx.beginPath();
  gctx.moveTo(cx, cy - r);
  gctx.quadraticCurveTo(cx + r * 0.2, cy - r * 1.25, cx + r * 0.1, cy - r * 1.5);
  gctx.stroke();

  // 火花
  const flicker = 0.7 + Math.sin(performance.now() / 60) * 0.3;
  const sparkGrad = gctx.createRadialGradient(cx + r * 0.1, cy - r * 1.5, 0, cx + r * 0.1, cy - r * 1.5, r * 0.3);
  sparkGrad.addColorStop(0, '#fff');
  sparkGrad.addColorStop(0.4, '#ffb627');
  sparkGrad.addColorStop(1, 'rgba(230, 57, 70, 0)');
  gctx.beginPath();
  gctx.arc(cx + r * 0.1, cy - r * 1.5, r * 0.22 * flicker, 0, Math.PI * 2);
  gctx.fillStyle = sparkGrad;
  gctx.fill();

  // 高光
  gctx.beginPath();
  gctx.arc(cx - r * 0.35, cy - r * 0.4, r * 0.18, 0, Math.PI * 2);
  gctx.fillStyle = 'rgba(255,255,255,0.3)';
  gctx.fill();

  // 警告標記
  gctx.fillStyle = '#e63946';
  gctx.font = `bold ${Math.floor(r * 0.45)}px Bungee, sans-serif`;
  gctx.textAlign = 'center';
  gctx.fillText('!', cx, cy + r * 0.18);
}

// ─────────────────────────────────────────────
//  粒子
// ─────────────────────────────────────────────
function spawnHitParticles(mole) {
  const hole = holes[mole.holeIdx];
  const cx = hole.x;
  const cy = hole.y - hole.radius * 1.2;
  const baseColor = mole.type === 'bomb' ? '#e63946' : mole.type === 'gold' ? '#ffb627' : '#fff8e7';
  const count = mole.type === 'gold' ? 28 : mole.type === 'bomb' ? 24 : 16;

  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const speed = 3 + Math.random() * 5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      decay: 0.025,
      size: 3 + Math.random() * 4,
      color: baseColor
    });
  }

  const text = mole.type === 'bomb' ? `${mole.points}` : `+${mole.points}`;
  particles.push({
    x: cx, y: cy,
    vx: 0, vy: -2.5,
    life: 1, decay: 0.018,
    size: 0,
    text,
    color: baseColor
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.vx *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    if (p.text) {
      gctx.save();
      gctx.globalAlpha = p.life;
      gctx.fillStyle = p.color;
      gctx.font = 'bold 36px Bungee, sans-serif';
      gctx.textAlign = 'center';
      gctx.strokeStyle = 'rgba(0,0,0,0.6)';
      gctx.lineWidth = 5;
      gctx.strokeText(p.text, p.x, p.y);
      gctx.fillText(p.text, p.x, p.y);
      gctx.restore();
    } else {
      gctx.globalAlpha = p.life;
      gctx.beginPath();
      gctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      gctx.fillStyle = p.color;
      gctx.fill();
      gctx.globalAlpha = 1;
    }
  }
}

// ─────────────────────────────────────────────
//  點擊水波
// ─────────────────────────────────────────────
function spawnTap(x, y, hit) {
  taps.push({
    x, y,
    radius: 10,
    maxRadius: hit ? 60 : 35,
    life: 1,
    color: hit ? '#ffb627' : 'rgba(255, 248, 231, 0.6)'
  });
}

function updateAndDrawTaps() {
  for (let i = taps.length - 1; i >= 0; i--) {
    const t = taps[i];
    t.radius += (t.maxRadius - t.radius) * 0.18;
    t.life -= 0.05;

    gctx.save();
    gctx.globalAlpha = t.life;
    gctx.strokeStyle = t.color;
    gctx.lineWidth = 3;
    gctx.beginPath();
    gctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
    gctx.stroke();
    gctx.restore();

    if (t.life <= 0) taps.splice(i, 1);
  }
}

// ─────────────────────────────────────────────
//  點擊處理
// ─────────────────────────────────────────────
function handleTap(clientX, clientY) {
  if (gameState !== 'playing') return;

  const rect = gameCanvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;

  let hitSomething = false;

  // 由近到遠檢查（下方優先）
  const sortedMoles = [...moles].sort((a, b) => holes[b.holeIdx].y - holes[a.holeIdx].y);

  for (const mole of sortedMoles) {
    if (mole.state === 'hit') continue;
    if (mole.progress < 0.45) continue;

    const hole = holes[mole.holeIdx];
    const showHeight = hole.radius * 1.5 * mole.progress;
    const cx = hole.x;
    const cy = hole.y - showHeight;
    const hitRadius = hole.radius * 0.95;

    const dx = x - cx;
    const dy = y - cy;
    if (Math.sqrt(dx * dx + dy * dy) < hitRadius) {
      whackMole(mole);
      hitSomething = true;
      break;
    }
  }

  spawnTap(x, y, hitSomething);
}

function whackMole(mole) {
  mole.state = 'hit';
  mole.progress = 1;

  spawnHitParticles(mole);

  if (mole.type === 'bomb') {
    score = Math.max(0, score + mole.points);
    bombsHit++;
  } else {
    score += mole.points;
    molesWhacked++;
    if (mole.type === 'gold') goldenWhacked++;
  }

  scoreValue.textContent = score;
  scoreValue.classList.remove('flash');
  void scoreValue.offsetWidth;
  scoreValue.classList.add('flash');

  hitValue.textContent = molesWhacked;
}

// 觸控 + 滑鼠都支援
gameCanvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    handleTap(touch.clientX, touch.clientY);
  }
}, { passive: false });

gameCanvas.addEventListener('mousedown', (e) => {
  // 桌機上滑鼠也能玩
  handleTap(e.clientX, e.clientY);
});

// ─────────────────────────────────────────────
//  天空背景
// ─────────────────────────────────────────────
function drawSky(W, H) {
  // 天空漸層
  const sky = gctx.createLinearGradient(0, 0, 0, H * 0.5);
  sky.addColorStop(0, '#87ceeb');
  sky.addColorStop(1, '#cfe7f3');
  gctx.fillStyle = sky;
  gctx.fillRect(0, 0, W, H * 0.18);

  // 地面漸層
  const ground = gctx.createLinearGradient(0, H * 0.18, 0, H);
  ground.addColorStop(0, '#cba87a');
  ground.addColorStop(0.4, '#a0743a');
  ground.addColorStop(1, '#5a3f24');
  gctx.fillStyle = ground;
  gctx.fillRect(0, H * 0.18, W, H);

  // 雲（簡單兩朵）
  const t = performance.now() / 80;
  drawCloud(((t * 0.3) % (W + 200)) - 100, H * 0.06, 0.7);
  drawCloud(((t * 0.2 + 300) % (W + 200)) - 100, H * 0.1, 0.5);

  // 地平線
  gctx.strokeStyle = 'rgba(0,0,0,0.15)';
  gctx.lineWidth = 1;
  gctx.beginPath();
  gctx.moveTo(0, H * 0.18);
  gctx.lineTo(W, H * 0.18);
  gctx.stroke();
}

function drawCloud(x, y, scale) {
  gctx.save();
  gctx.fillStyle = 'rgba(255,255,255,0.85)';
  gctx.beginPath();
  gctx.arc(x, y, 18 * scale, 0, Math.PI * 2);
  gctx.arc(x + 22 * scale, y - 4 * scale, 22 * scale, 0, Math.PI * 2);
  gctx.arc(x + 48 * scale, y, 18 * scale, 0, Math.PI * 2);
  gctx.arc(x + 28 * scale, y + 8 * scale, 16 * scale, 0, Math.PI * 2);
  gctx.fill();
  gctx.restore();
}

// ─────────────────────────────────────────────
//  主迴圈
// ─────────────────────────────────────────────
let lastFrameTime = performance.now();

function gameLoop() {
  const now = performance.now();
  const dt = now - lastFrameTime;
  lastFrameTime = now;

  const W = gameCanvas.width  / (window.devicePixelRatio || 1);
  const H = gameCanvas.height / (window.devicePixelRatio || 1);

  gctx.clearRect(0, 0, W, H);

  if (W > 0) drawSky(W, H);

  if (gameState === 'playing') {
    timeLeft = Math.max(0, GAME_DURATION - (now - gameStartTime) / 1000);
    timeValue.textContent = Math.ceil(timeLeft);
    if (timeLeft <= 0) {
      endGame('time');
    }

    const elapsed = (now - gameStartTime) / 1000;
    spawnInterval = Math.max(450, 1100 - elapsed * 12);
    if (now - lastSpawnTime > spawnInterval) {
      spawnMole();
      if (elapsed > 15 && Math.random() < 0.3) {
        setTimeout(spawnMole, 200);
      }
      lastSpawnTime = now;
    }

    updateMoles(dt);
  }

  for (const hole of holes) drawHole(hole);

  const sortedMoles = [...moles].sort((a, b) => holes[a.holeIdx].y - holes[b.holeIdx].y);
  for (const m of sortedMoles) drawMole(m);

  updateParticles();
  drawParticles();

  updateAndDrawTaps();

  requestAnimationFrame(gameLoop);
}

// ─────────────────────────────────────────────
//  遊戲流程
// ─────────────────────────────────────────────
function runCountdown() {
  startOverlay.classList.add('hidden');
  endOverlay.classList.add('hidden');
  gameState = 'countdown';

  // 重置數值
  score = 0;
  molesWhacked = 0;
  goldenWhacked = 0;
  bombsHit = 0;
  moles.length = 0;
  particles.length = 0;
  taps.length = 0;
  scoreValue.textContent = '0';
  hitValue.textContent = '0';
  timeValue.textContent = GAME_DURATION;

  let n = 3;
  countdown.classList.remove('hidden');
  countdownNum.textContent = n;
  countdownNum.style.animation = 'none';
  void countdownNum.offsetWidth;
  countdownNum.style.animation = '';

  const tick = setInterval(() => {
    n--;
    if (n > 0) {
      countdownNum.textContent = n;
      countdownNum.style.animation = 'none';
      void countdownNum.offsetWidth;
      countdownNum.style.animation = 'countPop 1s ease forwards';
    } else {
      clearInterval(tick);
      countdown.classList.add('hidden');
      beginGame();
    }
  }, 1000);
}

function beginGame() {
  gameState = 'playing';
  timeLeft = GAME_DURATION;
  gameStartTime = performance.now();
  lastSpawnTime = 0;
}

function endGame(reason) {
  gameState = 'ended';
  finalScore.textContent = score;
  let stat = `${molesWhacked} moles whacked`;
  if (goldenWhacked > 0) stat += ` · ${goldenWhacked} golden ★`;
  if (bombsHit > 0) stat += ` · ${bombsHit} 💣`;
  finalStats.textContent = stat;
  endEyebrow.textContent = "TIME'S UP";
  endOverlay.classList.remove('hidden');
}

function quitGame() {
  gameState = 'idle';
  moles.length = 0;
  particles.length = 0;
  taps.length = 0;
  endOverlay.classList.add('hidden');
  startOverlay.classList.remove('hidden');
  scoreValue.textContent = '0';
  hitValue.textContent = '0';
  timeValue.textContent = GAME_DURATION;
}

// ─────────────────────────────────────────────
//  事件
// ─────────────────────────────────────────────
startBtn.addEventListener('click', runCountdown);
restartBtn.addEventListener('click', runCountdown);
quitBtn.addEventListener('click', quitGame);

// 初始化
resizeCanvas();
requestAnimationFrame(gameLoop);
</script>
